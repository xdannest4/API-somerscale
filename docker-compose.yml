services:
  api-somerscale:
    build: .
    container_name: somerscale-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
